<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finland Flight Radar</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="map"></div>
    
    <div id="info-panel" class="hidden">
        <h2>Flight Details</h2>
        <div class="detail-row">
            <span class="label">Callsign:</span>
            <span id="detail-callsign" class="value">-</span>
        </div>
        <div class="detail-row">
            <span class="label">Origin:</span>
            <span id="detail-country" class="value">-</span>
        </div>
        <div class="detail-row">
            <span class="label">Altitude:</span>
            <span id="detail-altitude" class="value">-</span>
        </div>
        <div class="detail-row">
            <span class="label">Speed:</span>
            <span id="detail-velocity" class="value">-</span>
        </div>
        <div class="detail-row">
            <span class="label">Heading:</span>
            <span id="detail-heading" class="value">-</span>
        </div>
        <div class="last-updated">Last Updated: <span id="last-updated-time">-</span></div>
    </div>

    <div class="app-header">
        <h1>Finland Flight Radar</h1>
        <p class="subtitle">Live air traffic over Finland</p>
    </div>

    <div class="status-indicator">
        <div class="ping" id="status-ping"></div>
        <span id="status-text">Fetching data...</span>
    </div>

    <!-- Project Links Overlay -->
    <div class="project-links">
        <a href="https://github.com/ashrf-cmyk/Finland-Flight-Radar" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.43.372.823 1.102.823 2.222 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
            GitHub
        </a>
        <a href="https://finland-flight-radar-kappa.vercel.app/" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M24 22.525H0L12 .475l12 22.05z"/></svg>
            Vercel
        </a>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js"></script>
</body>
</html>
